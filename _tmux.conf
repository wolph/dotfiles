# Plugins, managed by tpm (https://github.com/tmux-plugins/tpm).
# <prefix> I installs, <prefix> U updates; bootstrap + load at end of file.
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "tmux-plugins/tmux-pain-control"
set -g @plugin "tmux-plugins/tmux-yank"
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @pane_resize "10"


# Make sure we get a 256 color terminal (help for Vim)
set -g default-terminal 'screen-256color'
set -ga terminal-overrides ",*256col*:Tc"


# Increase the history size limit
set -g history-limit 10000

# vi-style controls for copy mode
setw -g mode-keys vi
set -g @shell_mode 'vi'

set -g base-index 0
set -g pane-base-index 0

# fix ssh agent when tmux is detached
setenv -g SSH_AUTH_SOCK $HOME/.ssh/auth_sock

# Mouse options are version-specific (mouse-select-pane etc. were replaced
# by a single "mouse" option in tmux 2.1); set in _tmux/tmux_*.conf below.


# THEME
set -g status-bg black
set -g status-fg white
set -g status-interval 1
set -g status-left-length 35
set -g status-left '#[fg=green](#S)#[default]'
#set -g status-left '#[fg=green](#S) #(whoami)@#H#[default]'
set -g status-right '#[fg=yellow]#(TZ="Europe/Amsterdam" date +%%H:%%M:%%S)#[default]'
#set -g status-right '#(CUTE_BATTERY_INDICATOR=1 ~/bin/battery Discharging)      #[fg=yellow]#(cut -d " " -f 1-3 /proc/loadavg)#[default] #[fg=blue]%H:%M:%S#[default]'
set -g window-status-separator ''
set -g window-status-format '#[fg=#{?@tmux_tab_waiting,colour16,colour245},bg=#{?@tmux_tab_waiting,colour114,default}]#{?@tmux_tab_waiting,#[bold],} #{window_index}:#{window_name} #[default]'
set -g window-status-current-format '#[fg=#{?@tmux_tab_waiting,colour16,colour81},bg=#{?@tmux_tab_waiting,colour120,colour236},bold]▎#{window_index}:#{window_name} #[default]'

# Enable fast resizing and aggressive resizing for ssh'd sessions
# setw -g aggressive-resize on
set -s escape-time 0

# Copy-paste integration
set-option -g default-command "safe-reattach-to-user-namespace zsh -l"

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Setup 'v' to begin selection as in Vim
# bind-key -T copy-mode-vi v send-keys -X begin-selection
# bind-key -T copy-mode-vi v send-keys -X begin-selection
# bind-key -T copy-mode-vi y send-keys -X copy-selection
# bind-key -T copy-mode-vi r send-keys -X rectangle-toggle
# bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
# bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe 'reattach-to-user-namespace pbcopy'
# bind-key -t vi-copy v begin-selection
# bind-key -t vi-copy y copy-pipe "safe-reattach-to-user-namespace pbcopy"

# Update default binding of `Enter` to also use copy-pipe
# unbind -t vi-copy Enter
# bind-key -t vi-copy Enter copy-pipe "safe-reattach-to-user-namespace pbcopy"

# Bind ']' to pbpaste
# bind ] run 'safe-reattach-to-user-namespace pbpaste | tmux load-buffer - && tmux paste-buffer'

# Set the prefix to ^A.
unbind C-b
set -g prefix ^A
bind a send-prefix

# Bind appropriate commands similar to screen.
# lockscreen ^X x 
unbind ^X
bind ^X lock-server
unbind x
bind x lock-server

# screen ^C c 
unbind ^C
bind ^C new-window

# Taken care of in ~/.tmux/*.conf
# unbind c
# bind c new-window -c "#{pane_current_path}"
# bind '"' split-window -c "#{pane_current_path}"
# bind % split-window -h -c "#{pane_current_path}"

# displays * 
unbind *
bind * list-clients

# detach ^D d
unbind ^D
unbind d
bind ^D detach
bind d detach

# next ^@ ^N sp n 
unbind ^@
bind ^@ next-window
unbind ^N
bind ^N next-window
unbind " "
bind " " next-window
unbind n
bind n next-window

# title A
unbind A
bind A command-prompt "rename-window %%"

# set-options -g set-titles on
# set-options -g set-titles-string '#T'
set -g allow-rename on

# other ^A
unbind ^A
bind ^A last-window

# prev ^H ^P p ^? 
unbind ^H
bind ^H previous-window
unbind ^P
bind ^P previous-window
unbind p
bind p previous-window
unbind BSpace
bind BSpace previous-window

# windows ^W w 
unbind ^W
bind ^W list-windows
unbind w
bind w list-windows

# quit \ 
unbind '\'
bind '\' confirm-before "kill-server"

# kill K k 
unbind K
bind K confirm-before "kill-window"
unbind k
bind k confirm-before "kill-window"

# redisplay ^L l 
unbind ^L
bind ^L refresh-client
unbind l
bind l refresh-client

# split -v |
unbind |
bind | split-window

# :kB: focus up
unbind Tab
bind Tab select-pane -t:.+
unbind BTab
bind BTab select-pane -t:.-

# " windowlist -b
unbind '"'
bind '"' choose-window

# split windows like vim
# vim's definition of a horizontal/vertical split is reversed from tmux's
bind s split-window -v
bind ^S split-window -v
bind v split-window -h
bind ^V split-window -h

# move around panes with hjkl, as one would in vim after pressing ctrl-w
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize panes like vim
# feel free to change the "1" to however many lines you want to resize by, only
# one at a time can be slow
bind < resize-pane -L 1
bind > resize-pane -R 1
bind - resize-pane -D 1
bind + resize-pane -U 1

# bind : to command-prompt like vim
# this is the default in tmux already
bind : command-prompt

# Overwrite configs depending on version
run-shell "bash ~/.tmux/tmux.conf.sh"

set -g allow-passthrough on
set -g focus-events on

# Toggle mouse with ^M; then report it's new status
bind-key C-m set-option -g mouse \; display-message 'Mouse #{?mouse,on,off}'

# Bootstrap tpm on first start, then load plugins. Keep at end of file.
if "test ! -d ~/.tmux/plugins/tpm" \
    "run 'git clone --depth=1 https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
run "~/.tmux/plugins/tpm/tpm"
