# Gitleaks config for this repo; used automatically by `gitleaks git` and via
# bin/git-scan from the lefthook pre-commit/pre-push hooks.
[extend]
useDefault = true

[allowlist]
description = "The scanner and its tests reference token formats by construction, never literally"
paths = [
    '''bin/git-scan''',
    '''tests/git-scan-test\.sh''',
]
